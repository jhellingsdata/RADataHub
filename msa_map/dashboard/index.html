<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSA Evidence Base</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<header id="page-header">
  <div id="wordmark">England's Mayoral<br>Strategic Authorities</div>
  <div id="place-selector">
    <span id="place-label">Place</span>
    <div class="select-wrap">
      <select id="msa-select"></select>
    </div>
  </div>
</header>

<div id="content">

  <div id="authority-header">
    <div id="breadcrumb"></div>
    <div id="authority-name-row">
      <h1 id="authority-name"></h1>
      <span id="tier-pill" class="tier-pill"></span>
    </div>
    <div id="meta-row"></div>
  </div>

  <div id="map-section">
    <div id="boundary-map"></div>
    <div id="map-caption"></div>
  </div>

  <div id="indicators-sections"></div>

  <div id="deep-dive-section"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Config ─────────────────────────────────────────────────────────────────
const DATA_PATH         = '../data/processed/msa_all_indicators.json';
const CA_GEOJSON_PATH   = '../data/processed/ca.geojson';
const LAD_GEOJSON_PATH  = '../data/processed/lad.geojson';
const DEFAULT_MSA_ID    = 'ynyca';
const TIERS             = ['Established', 'Existing', 'DPP'];
const CHARTS_PATH        = '../data/processed/charts';

const fmtInt   = v => Math.round(v).toLocaleString('en-GB');
const fmtDec1  = v => v.toLocaleString('en-GB', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

// Indicator table definitions, in display order, grouped by `group`.
// better: 'higher' | 'lower' | 'context' — drives delta colour + comparison wording.
// benchmarkKey/benchmarkValue → "vs England" column; omit when no benchmark exists (cell shows "Pending").
// changeKey → "Change" column pulls a different indicator field representing change-over-time
//   (only gva_ph_2023 has one available — gva_growth_2018_23). Omit elsewhere (cell shows "Pending").
// rankKey looks up msa.ranks; omit to show "Pending" in the Rank column.
const INDICATOR_CONFIG = [
  {
    group: 'Snapshot', key: 'density_2024', label: 'Population density', sourceYear: 'ONS, mid-2024 estimate',
    unit: 'people per km²', format: fmtDec1, better: 'context',
    benchmarkKey: 'density_2024', rankKey: 'density_2024',
  },
  {
    group: 'Snapshot', key: 'rural_urban_score', label: 'Rural/urban score', sourceYear: 'ONS RUC 2021, mid-2024 population-weighted',
    unit: '0 = fully urban, 100 = fully rural', format: fmtDec1, better: 'context',
    benchmarkKey: 'rural_urban_score', rankKey: 'rural_urban_score',
  },
  {
    group: 'Economy', key: 'gva_ph_2023', label: 'GVA per head', sourceYear: 'ONS, 2023',
    unit: '', format: v => '£' + fmtInt(v), better: 'higher',
    benchmarkKey: 'gva_ph_2023', rankKey: 'gva_ph_2023',
    changeKey: 'gva_growth_2018_23', changeSinceLabel: 'since 2018',
  },
  {
    group: 'Economy', key: 'gva_growth_2018_23', label: 'GVA growth 2018–23', sourceYear: 'ONS, 2018–2023',
    unit: '', format: v => fmtDec1(v) + '%', better: 'higher',
    benchmarkKey: 'gva_growth_2018_23', rankKey: 'gva_growth_2018_23',
  },
  {
    group: 'Deprivation', key: 'imd_pct_decile1', label: '% LSOAs most deprived 10%', sourceYear: 'MHCLG, IMD 2025',
    unit: '', format: v => fmtDec1(v) + '%', better: 'lower',
    benchmarkKey: 'imd_pct_decile1', rankKey: 'imd_pct_decile1',
  },
];

// ── State ──────────────────────────────────────────────────────────────────
let DATA = null;
let boundaryMap = null;
let boundaryLayer = null;
let cachedCaGeo = null, cachedLadGeo = null;

// ── Load ───────────────────────────────────────────────────────────────────
async function loadJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
  return res.json();
}

async function init() {
  try {
    DATA = await loadJSON(DATA_PATH);
  } catch (err) {
    console.error(err);
    alert(`Could not load ${DATA_PATH}.\n\nRun "python scripts/build_dashboard_data.py" first, then reload via Live Server.`);
    return;
  }

  populateDropdown();

  const select = document.getElementById('msa-select');
  select.addEventListener('change', e => renderProfile(e.target.value));

  const requestedId = new URLSearchParams(window.location.search).get('msa');
  const defaultMsa = DATA.msas.find(m => m.id === requestedId)
                   || DATA.msas.find(m => m.id === DEFAULT_MSA_ID)
                   || DATA.msas[0];
  select.value = defaultMsa.id;
  renderProfile(defaultMsa.id);
}

function populateDropdown() {
  const select = document.getElementById('msa-select');
  TIERS.forEach(tier => {
    const group = document.createElement('optgroup');
    group.label = tier;
    DATA.msas.filter(m => m.tier === tier).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      group.appendChild(opt);
    });
    select.appendChild(group);
  });
}

// ── Render: profile (fade transition) ───────────────────────────────────────
function renderProfile(id) {
  const msa = DATA.msas.find(m => m.id === id);
  if (!msa) return;
  const content = document.getElementById('content');
  content.classList.add('fading');
  setTimeout(() => {
    renderAuthorityHeader(msa);
    renderIndicatorTable(msa);
    renderBoundaryMap(msa);
    renderDeepDive(msa);
    content.classList.remove('fading');
  }, 180);
}

// ── Render: authority header ─────────────────────────────────────────────────
function renderAuthorityHeader(msa) {
  document.getElementById('breadcrumb').textContent = `England · ${msa.gss_code} · ${msa.tier}`;
  document.getElementById('authority-name').textContent = msa.name;

  const pill = document.getElementById('tier-pill');
  pill.textContent = msa.tier;
  pill.className = `tier-pill tier-${msa.tier.toLowerCase()}`;

  const parts = [
    `Mayor: ${msa.mayor}`,
    `Established: ${msa.established}`,
    `Deal Level: ${msa.deal_level}`,
    `Area: ${msa.area_km2.toLocaleString('en-GB')} km²`,
  ];
  const pop = msa.indicators.pop_2024;
  if (pop !== null && pop !== undefined) parts.push(`Population: ${fmtInt(pop)}`);
  if (msa.rural_urban_tag) parts.push(msa.rural_urban_tag);
  let html = parts
    .map(p => `<span>${p}</span>`)
    .join('<span class="meta-sep">·</span>');
  if (msa.website) {
    html += `<span class="meta-sep">·</span><a href="${msa.website}" target="_blank" rel="noopener">Website</a>`;
  }
  document.getElementById('meta-row').innerHTML = html;
}

// ── Render: indicator table ──────────────────────────────────────────────────
function renderIndicatorTable(msa) {
  const container = document.getElementById('indicators-sections');
  container.innerHTML = '';
  const benchmarks = DATA.metadata.england_benchmarks;

  const table = document.createElement('table');
  table.id = 'indicator-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th class="col-indicator">Indicator</th>
        <th class="col-latest">Latest</th>
        <th class="col-vs-england">vs England</th>
        <th class="col-change">Change</th>
        <th class="col-rank">Rank in MSAs</th>
      </tr>
    </thead>
  `;

  const tbody = document.createElement('tbody');
  let currentGroup = null;

  INDICATOR_CONFIG.forEach(cfg => {
    if (cfg.group !== currentGroup) {
      currentGroup = cfg.group;
      const groupRow = document.createElement('tr');
      groupRow.className = 'group-row';
      groupRow.innerHTML = `<td colspan="5">${cfg.group}</td>`;
      tbody.appendChild(groupRow);
    }

    const value = msa.indicators[cfg.key];
    const row = document.createElement('tr');
    row.className = 'indicator-row';

    if (value === null || value === undefined) {
      row.innerHTML = `
        <td class="cell-indicator">
          <div class="ind-name">${cfg.label}</div>
          <div class="ind-source">${cfg.sourceYear}</div>
        </td>
        <td colspan="4"><span class="pending">Pending</span></td>
      `;
      tbody.appendChild(row);
      return;
    }

    // LATEST
    const latestHtml = `
      <span class="latest-value">${cfg.format(value)}</span>
      ${cfg.unit ? `<div class="latest-unit">${cfg.unit}</div>` : ''}
    `;

    // VS ENGLAND
    const benchmark = cfg.benchmarkKey ? benchmarks[cfg.benchmarkKey]
                     : (cfg.benchmarkValue !== undefined ? cfg.benchmarkValue : null);
    let vsEnglandHtml = `<span class="pending">Pending</span>`;
    if (benchmark !== null && benchmark !== undefined) {
      const diff     = ((value - benchmark) / benchmark) * 100;
      const diffAbs  = fmtDec1(Math.abs(diff));
      const sign     = diff >= 0 ? '+' : '−';
      const aboveBelow = diff >= 0 ? 'above' : 'below';
      let colourClass = 'neutral';
      if (cfg.better === 'higher') colourClass = diff >= 0 ? 'pos' : 'neg';
      else if (cfg.better === 'lower') colourClass = diff <= 0 ? 'pos' : 'neg';
      vsEnglandHtml = `
        <span class="delta ${colourClass}">${sign}${diffAbs}%</span>
        <div class="sub-line">${aboveBelow} England (${cfg.format(benchmark)})</div>
      `;
    }

    // CHANGE (time-based — only populated where a real change-over-time field exists)
    let changeHtml = `<span class="pending">Pending</span>`;
    if (cfg.changeKey) {
      const changeVal = msa.indicators[cfg.changeKey];
      if (changeVal !== null && changeVal !== undefined) {
        const sign = changeVal >= 0 ? '+' : '−';
        const colourClass = changeVal >= 0 ? 'pos' : 'neg';
        changeHtml = `
          <span class="delta ${colourClass}">${sign}${fmtDec1(Math.abs(changeVal))}%</span>
          <div class="sub-line">${cfg.changeSinceLabel}</div>
        `;
      }
    }

    // RANK
    const rank = cfg.rankKey ? msa.ranks[cfg.rankKey] : null;
    const rankHtml = (rank !== null && rank !== undefined)
      ? `<span class="rank-num">${rank}</span><span class="rank-denom"> / 20</span>`
      : `<span class="pending">Pending</span>`;

    row.innerHTML = `
      <td class="cell-indicator">
        <div class="ind-name">${cfg.label}</div>
        <div class="ind-source">${cfg.sourceYear}</div>
      </td>
      <td class="cell-latest">${latestHtml}</td>
      <td class="cell-vs-england">${vsEnglandHtml}</td>
      <td class="cell-change">${changeHtml}</td>
      <td class="cell-rank">${rankHtml}</td>
    `;
    tbody.appendChild(row);
  });

  table.appendChild(tbody);
  container.appendChild(table);
}

// ── Render: deep dive (currently YNYCA only — extend DEEP_DIVES to add more) ─
const DEEP_DIVES = {
  ynyca: {
    heading: 'Rurality &amp; Deprivation',
    intro: 'A closer look at how rural/urban character and deprivation relate across YNYCA\'s 500 LSOAs.',
    items: [
      {
        img: 'ynyca_lsoa_imd_map.png',
        alt: 'Map of Index of Multiple Deprivation 2025 by LSOA across York and North Yorkshire',
        caption: 'IMD 2025 decile by LSOA. Source: MHCLG IoD 2025, ONS LSOA boundaries 2021.',
        text: 'Deprivation in YNYCA isn\'t a countryside story. It clusters in two specific places &mdash; Scarborough\'s coastal towns and pockets of York &mdash; and every one of the area\'s 41 most-deprived LSOAs is urban.',
      },
      {
        img: 'ynyca_rurality_vs_imd_scatter.png',
        alt: 'Scatter plot of rurality score vs IMD rank for YNYCA LSOAs',
        caption: 'Rurality score vs national IMD rank, all 500 LSOAs. Source: ONS RUC 2021, MHCLG IoD 2025.',
        text: 'Across all 500 LSOAs, rurality barely predicts deprivation at all (correlation: &minus;0.11). Being rural makes a place no more likely to be comfortable than disadvantaged.',
      },
      {
        img: ['ynyca_york_centre_vs_imd.png', 'ynyca_ripon_centre_vs_imd.png'],
        alt: ['Scatter plot of distance from York city centre vs IMD rank', 'Scatter plot of distance from Ripon city centre vs IMD rank'],
        caption: 'Distance from city centre vs IMD rank, urban LSOAs only. Source: ONS RUC 2021, MHCLG IoD 2025.',
        text: 'Zoom into York and Ripon specifically, though, and a real donut effect appears: deprivation is sharpest at the historic core and fades toward the suburbs (York +0.35, Ripon +0.71) &mdash; a city effect that none of YNYCA\'s market towns share.',
      },
    ],
  },
};

function renderDeepDive(msa) {
  const el = document.getElementById('deep-dive-section');
  const dive = DEEP_DIVES[msa.id];
  if (!dive) { el.innerHTML = ''; return; }

  const itemsHtml = dive.items.map((item, i) => {
    const imgs = Array.isArray(item.img) ? item.img : [item.img];
    const alts = Array.isArray(item.alt) ? item.alt : [item.alt];
    const imgsHtml = imgs.map((src, j) => `
      <div class="profile-chart-wrap">
        <img src="${CHARTS_PATH}/${src}" alt="${alts[j] || ''}" loading="lazy" />
      </div>
    `).join('');
    return `
      <div class="profile-section${i % 2 === 1 ? ' reverse' : ''}">
        <div class="profile-charts">
          ${imgsHtml}
          <p class="profile-caption">${item.caption}</p>
        </div>
        <div class="profile-text">
          <p class="profile-insight">${item.text}</p>
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="deep-dive-heading">
      <h2>${dive.heading}</h2>
      <p class="profile-intro">${dive.intro}</p>
    </div>
    ${itemsHtml}
  `;
}

// ── Render: boundary map ────────────────────────────────────────────────────
// MSA boundary layer style — visible on satellite imagery (white dashed border,
// light teal fill so the imagery shows through, rather than the solid fill used
// when the basemap was just a flat grey England silhouette).
const msaStyle = {
  color:       '#FFFFFF',
  weight:       2.5,
  opacity:      1,
  fillColor:   '#2A9D8F',
  fillOpacity:  0.15,
  dashArray:   '6, 4',
};

async function renderBoundaryMap(msa) {
  const captionEl = document.getElementById('map-caption');

  if (!boundaryMap) {
    boundaryMap = L.map('boundary-map', {
      attributionControl: true,
      zoomControl: true,
    });

    // Layer 1 — satellite imagery base
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics',
        maxZoom: 18,
      }
    ).addTo(boundaryMap);

    // Layer 2 — roads, place names and boundaries (transparent overlay)
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      {
        attribution: '',
        maxZoom: 18,
        opacity: 1,
      }
    ).addTo(boundaryMap);
  }

  if (boundaryLayer) { boundaryMap.removeLayer(boundaryLayer); boundaryLayer = null; }

  try {
    let targetLayer;
    if (msa.gss_code === 'TBC') {
      captionEl.textContent = 'Boundary not yet statutory — approximate boundary shown using constituent local authorities.';

      if (!cachedLadGeo) cachedLadGeo = await loadJSON(LAD_GEOJSON_PATH);
      const codes = new Set(msa.constituent_lad_codes || []);
      targetLayer = L.geoJSON(cachedLadGeo, {
        filter: f => codes.has(f.properties.LAD25CD),
        style: msaStyle,
      }).addTo(boundaryMap);
    } else {
      captionEl.textContent = 'Statutory boundary — ONS Combined Authorities (December 2025).';

      if (!cachedCaGeo) cachedCaGeo = await loadJSON(CA_GEOJSON_PATH);
      targetLayer = L.geoJSON(cachedCaGeo, {
        filter: f => f.properties.CAUTH25CD === msa.gss_code,
        style: msaStyle,
      }).addTo(boundaryMap);
    }

    boundaryLayer = targetLayer;
    const bounds = targetLayer.getBounds();
    if (bounds.isValid()) {
      boundaryMap.fitBounds(bounds, { padding: [20, 20] });
    } else {
      boundaryMap.setView([53.0, -1.5], 6);
    }
  } catch (err) {
    console.error('Boundary map load error:', err);
  }

  // Container may have been laid out after Leaflet measured it (e.g. first paint) — re-measure.
  setTimeout(() => boundaryMap.invalidateSize(), 200);
}

// ── Go ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
